services:
  - type: web
    name: chatbot-with-attitude
    runtime: python
    plan: free
    region: oregon
    # CORRECTED KEY: use rootDir instead of rootDirectory
    rootDir: backend
    # Best way for 'uv' users
    buildCommand: uv sync
    startCommand: uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12